<!DOCTYPE html>
<html lang="es">
<head>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<meta charset="utf-8">
	<title>Registrarse</title>
	<style>
		body { font-family:sans-serif;background:#e2e8f0; display:flex; justify-content:center; height:100vh; margin:0; }
		.contenedor { display:flex; background:white; border-radius:10px; overflow:hidden; box-shadow:0 4px rgba(0, 0, 0, 0.1); width:700px;}
		.formulario { padding:40px; flex:1;}
		.sidebar { background:#00ccb4; padding:40px; color:white; width:250px; text-align:center;}
		input { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;}
		button { width:100%; padding:10px; background:#1e293b; color:white; border:none; border-radius:5px; cursor:pointer;}
		.volver { display:block; margin-top:20px; color:5b7a9c; text-decoration:none;}
	</style>
</head>
<body>
	<div class="contenedor">
		<div class="formulario">
			<h2>Registrarse</h2>
			<form>
				<input type="text" placeholder="Nombre" required>
				<input type="email" placeholder="Correo" required>
				<input type="password" placeholder="Contraseña" required>
				<button type="submit">Registrar</button>
			</form>
			<a href="Pagina web2.html" class="volver>">← Volver al Inicio</a>
		</div>
		<div class="sidebar">
			<h3>Iniciar Sesión</h3>
			<p>¿Ya tienes cuenta?</p>
			<button onclick="windon.location.href='login.html'">Ingresar</button>
			<button class="btn-fb">
    <button class="btn-social" style="background: #3b5998; color: white;">
                <i class="fab fa-facebook"></i> Acceder con Facebook
            </button>
            
            <button class="btn-social" style="background: #1da1f2; color: white;">
                <i class="fab fa-twitter"></i> Acceder con Twitter
            </button>
            
            <button class="btn-social" style="background: #009988; color: white;">
                <i class="fas fa-envelope"></i> Acceder con Correo
            </button>
		</div>
	</div>
</body>
</html>
