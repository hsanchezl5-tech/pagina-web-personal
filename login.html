<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<title>Iniciar Sesión</title>
	<style>
		body {
			font-family: 'Segoe UI', sans-serif;
			background: #00ccb4;
			display:flex ;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}
		.caja-login {
			background: white;
			padding: 40px;
			border-radius: 15px;
			width: 300px;
			text-align: center;
			box-shadow: 0 4px rgba(0, 0, 0, 0.2);
		}
		h2 { color:#1e293b; margin-bottom:20px;}
		input {
			width: 100%;
			padding: 12px;
			margin: 10px 0;
			border: 1px solic #ccc;
			border-radius: 5px;
			box-sizing: border-box;
		}
		button{
			width: 100%;
			padding: 12px;
			background: #1e293b;
			color: white;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			font-weight: bold;
		}
		button:hover { background:#334155;}
		.volver { display:block; margin-top:20px; color:#5b7a9c; text-decoration:none; }
	</style>
	</head>
	<body>
		<div class="caja-login">
			<h2>Iniciar Sesión</h2>
			<form>
				<input type="text" placeholder="Usuario" required>
					<input type="password" placeholder="contraseña" required>
					<button type="submit"> Ingresar</button>
					<a href="recuperar.html" style="display:block; margin-top: 15px; color: #5b7a9c; text-decoration: none; font-size: 14px;">¿Olvidó su contraseña?</a>
				</form>
				<a href= "Pagina web2.html" class="volver">Volver al Inicio</a>
			</div>

		</body>
		</html>
