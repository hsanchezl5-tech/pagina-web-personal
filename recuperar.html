<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<title>Restablecer contraseña</title>
	<style> {
		body { front-family:sans-serif; background:#f8f9fa; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
		.caja recuperar { background:white; padding:50px; border-radius:10px; width:400px; box-shadow: 0 4px 10pz rgba(0, 0, 0, 0.1);}
		h2 { color:#333; margin-bottom:10px;}
		.linea { width:30px; height:4px; background:#333; margin-bottom:20px; }
		p {color:#666; font-size: 14px; margin-bottom: 20px;}
		input {width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
		button {width: 100%; padding: 12px; background: #ff7ff50; color: width; border: none; border-radius: 5px; cursor: pointer font-weight:bold;}
	</style>
</head>
<body>
	<div class="caja-recuperar">
		<h2>Restablesca su contraseña</h2>
		<div class="linea"></div>
		<p>Le enviaremos un correo electrónico con más instrucciones sobre como restablecer su contraseña</p>
		<form>
			<input type="email" placeholder="Correo electrónico" required>
			<button type="submit">Enviar un email</button>
		</form>
	</div>
</body>
</html>
